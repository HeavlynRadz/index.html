<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Styles</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .large-font {
            font-size: 24px;
        }

        .colored-text {
            color: red;
        }

        .different-font {
            font-family: 'Courier New', Courier, monospace;
        }

        .bold-italic-underline {
            font-weight: bold;
            font-style: italic;
            text-decoration: underline;
        }

        .uppercase {
            text-transform: uppercase;
        }

        .letter-spacing {
            letter-spacing: 5px;
        }

        .line-height {
            line-height: 5;
        }
    </style>
</head>
<body>

    <p class="large-font">To jest tekst z dużą czcionką</p>
    <p class="colored-text">To jest tekst kolorowy</p>
    <p class="different-font">To jest tekst z innym krojem pisma</p>
    <p class="bold-italic-underline">To jest tekst pogrubiony, pochylony i podkreślony</p>
    <p class="uppercase">TO JEST TEKST Z TRANSFORMACJĄ</p>
    <p class="letter-spacing">To jest tekst z odstępami między literami</p>
    <p class="line-height">To jest tekst z większą wysokością linii</p>

</body>
</html>
